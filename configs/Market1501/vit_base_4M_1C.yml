MODEL:
  PRETRAIN_CHOICE: 'imagenet'
  # PRETRAIN_PATH: 'C:\Users\ziwang\.conda\jx_vit_base_p16_224-80ecf9dd.pth'
  PRETRAIN_PATH: 'model/jx_vit_base_p16_224-80ecf9dd.pth'
  CAPTION_MODEL_PATH: "model/bert-base-uncased"
  METRIC_LOSS_TYPE: 'triplet'
  IF_LABELSMOOTH: 'off'
  IF_WITH_CENTER: 'no'
  NAME: 'transformer'
  NO_MARGIN: True
  DEVICE_ID: ('4')
  TRANSFORMER_TYPE: 'vit_base_patch16_224_TransReID'
  STRIDE_SIZE: [16, 16]
  # TRAIN_MODE: 'RNT'
  DISTILL:
    ENABLE: False
    W: 0.1          # λ_dist in the paper

INPUT:
  SIZE_TRAIN: [256, 128]
  SIZE_TEST: [256, 128]
  PROB: 0.5 # random horizontal flip
  RE_PROB: 0.5 # random erasing
  PADDING: 10
  PIXEL_MEAN: [0.5, 0.5, 0.5]
  PIXEL_STD: [0.5, 0.5, 0.5]

DATASETS:
  MULTI: False                 # False → use the single dataset in NAMES
  NAMES: [market1501, market1501_MM]
  ROOT_DIR: ('/data_sata/ReID_Group/ReID_Group/TestTimeTraining/MMTTA-ReID-v1-Umair-2/MMTTA-ReID-4M-v1-Umair/data/Market1501/')

DATALOADER:
  SAMPLER: 'softmax_triplet'
  NUM_INSTANCE: 4
  NUM_WORKERS: 8

IMAGE_MODALITY: ["RGB", "IR", "TI"]

CAPTION:
  ENABLE: False
  STRATEGY: "rgb_only"   # or "rgb_only" / "matched"
  LOSS:
    INFO_NCE: True   # new switch
    TRIPLET: False
    ADAPTIVE_TRIPLET: True
    CONTRASTIVE: True
    WEIGHT: 0.5
    
TRAIN:
  ADAPTER_ONLY: False
SOLVER:
  OPTIMIZER_NAME: 'SGD'
  MAX_EPOCHS: 120
  BASE_LR: 0.008
  IMS_PER_BATCH: 128
  WARMUP_METHOD: 'linear'
  LARGE_FC_LR: False
  CHECKPOINT_PERIOD: 10
  LOG_PERIOD: 50
  EVAL_PERIOD: 10
  WEIGHT_DECAY:  1e-4
  WEIGHT_DECAY_BIAS: 1e-4
  BIAS_LR_FACTOR: 2
  # SEED: 1

TTA:
  ENTROPY_ENABLE: True
  ENTROPY_W:      1.0


TEST:
  EVAL: True
  IMS_PER_BATCH: 256
  RE_RANKING: False
  # WEIGHT: 'E:\code\TransReID-3modal-ttt-main-AAAI2024\logs_rgbnt201\baseline+CIM15-68.5% 71.1% 82.7% 88.9%\transformer_best.pth'
  WEIGHT: ''
  # NECK_FEAT: 'after'
  NECK_FEAT: 'before'
  FEAT_NORM: 'yes'

OUTPUT_DIR: './logs/Market1501/4M-v1-1C'
